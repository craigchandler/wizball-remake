name: Release Builds

# Trigger on version tags (e.g. v1.2.3) or manually via the Actions UI.
# The final "release" job only runs on tag pushes; manual dispatch is
# useful for smoke-testing all four builds without publishing anything.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Pre-build: rebuild generated runtime assets and package them into data.zip.
  # The wizball_data_zip target runs the headless rebuild steps first, then
  # creates the archive that all packaging jobs consume.
  # ────────────────────────────────────────────────────────────────────────────
  build-gamedata:
    name: Build game data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install SDL2 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev \
            ninja-build

      - name: Build wizball data.zip
        run: |
          cmake -S . -B build-data -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWIZBALL_PORTMASTER=OFF \
            -DWIZBALL_RENDER_BACKEND=SDL
          cmake --build build-data --target wizball_data_zip -j1

      - name: Collect packaged game data
        run: |
          mkdir -p generated-data
          cp build-data/data.zip generated-data/

      - uses: actions/upload-artifact@v6
        with:
          name: gamedata
          path: generated-data/

  # ────────────────────────────────────────────────────────────────────────────
  # Linux x86_64 — native build on the ubuntu-latest runner
  # ────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    needs: [build-gamedata]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: gamedata
          path: generated-data/

      - name: Install SDL2 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev \
            ninja-build

      - name: Configure
        run: |
          cmake -S . -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWIZBALL_PORTMASTER=OFF \
            -DWIZBALL_RENDER_BACKEND=SDL

      - name: Build
        run: cmake --build build-linux --target wizball -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist/wizball-linux-x86_64
          cp build-linux/wizball dist/wizball-linux-x86_64/wizball.x86_64
          cp generated-data/data.zip dist/wizball-linux-x86_64/
          tar -czf wizball-linux-x86_64-${{ github.ref_name }}.tar.gz -C dist wizball-linux-x86_64

      - uses: actions/upload-artifact@v6
        with:
          name: wizball-linux-x86_64
          path: wizball-linux-x86_64-${{ github.ref_name }}.tar.gz

  # ────────────────────────────────────────────────────────────────────────────
  # Windows x86_64 — MinGW cross-compile inside the Dockerfile.windows image
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: ubuntu-latest
    needs: [build-gamedata]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: gamedata
          path: generated-data/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Dockerfile.windows; layers are cached in GitHub's cache so
      # the SDL2 archive downloads only happen on the first run (or when the
      # Dockerfile changes).
      - name: Build Windows cross-compile image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.windows
          load: true
          tags: wizball-builder-windows:latest
          cache-from: type=gha,scope=builder-windows
          cache-to: type=gha,mode=max,scope=builder-windows

      - name: Cross-compile
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            wizball-builder-windows:latest \
            bash -lc '
              set -euo pipefail
              cmake -S . -B build-windows -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE=/toolchain-windows.cmake \
                -DWIZBALL_PORTMASTER=OFF
              cmake --build build-windows --target wizball -j$(nproc)
              # Copy SDL2 runtime DLLs next to the exe
              cp /usr/x86_64-w64-mingw32/bin/SDL2.dll        build-windows/
              cp /usr/x86_64-w64-mingw32/bin/SDL2_mixer.dll  build-windows/
              cp /usr/x86_64-w64-mingw32/bin/SDL2_image.dll  build-windows/
              # Optional codec/helper DLLs shipped by SDL2_mixer (libopus, libvorbis, etc.)
              for dll in /usr/x86_64-w64-mingw32/bin/lib*.dll; do
                [ -f "$dll" ] && cp "$dll" build-windows/ || true
              done
            '

      - name: Package
        run: |
          mkdir -p dist/wizball-windows-x86_64
          cp build-windows/wizball.exe dist/wizball-windows-x86_64/
          cp build-windows/*.dll       dist/wizball-windows-x86_64/
          cp generated-data/data.zip   dist/wizball-windows-x86_64/
          cd dist && zip -r ../wizball-windows-x86_64-${{ github.ref_name }}.zip wizball-windows-x86_64

      - uses: actions/upload-artifact@v6
        with:
          name: wizball-windows-x86_64
          path: wizball-windows-x86_64-${{ github.ref_name }}.zip

  # ────────────────────────────────────────────────────────────────────────────
  # PortMaster aarch64 — QEMU-emulated arm64 build using the upstream container
  # Uploads only the arch binary; packaging is done in package-portmaster.
  # ────────────────────────────────────────────────────────────────────────────
  build-portmaster-aarch64:
    name: PortMaster aarch64
    runs-on: ubuntu-latest
    needs: [build-gamedata]
    steps:
      - uses: actions/checkout@v6

      # Register QEMU binfmt handlers so the arm64 container runs transparently
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Pull aarch64 builder image
        run: |
          docker pull --platform linux/arm64 \
            ghcr.io/monkeyx-net/portmaster-build-templates/portmaster-builder:aarch64-latest

      - name: Build aarch64
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ghcr.io/monkeyx-net/portmaster-build-templates/portmaster-builder:aarch64-latest \
            bash -lc '
              set -euo pipefail
              # Ensure ninja is available (install if missing)
              command -v ninja || (apt-get update -qq && apt-get install -y ninja-build)
              cmake -S . -B build-aarch64 -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DWIZBALL_RENDER_BACKEND=GLES2
              cmake --build build-aarch64 --target wizball -j$(nproc)
            '

      - uses: actions/upload-artifact@v6
        with:
          name: portmaster-binary-aarch64
          path: build-aarch64/wizball.aarch64

  # ────────────────────────────────────────────────────────────────────────────
  # PortMaster armhf — cross-compile inside the Dockerfile.armhf image
  # Uploads only the arch binary; packaging is done in package-portmaster.
  # ────────────────────────────────────────────────────────────────────────────
  build-portmaster-armhf:
    name: PortMaster armhf
    runs-on: ubuntu-latest
    needs: [build-gamedata]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Dockerfile.armhf; layers cached so the apt-get cross toolchain
      # install only runs on the first build or when the Dockerfile changes.
      - name: Build armhf cross-compile image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.armhf
          load: true
          tags: wizball-builder-armhf:latest
          cache-from: type=gha,scope=builder-armhf
          cache-to: type=gha,mode=max,scope=builder-armhf

      - name: Cross-compile armhf
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            wizball-builder-armhf:latest \
            bash -lc '
              set -euo pipefail
              cmake -S . -B build-armhf -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DWIZBALL_RENDER_BACKEND=GLES2 \
                -DCMAKE_TOOLCHAIN_FILE=/toolchain-armhf.cmake
              cmake --build build-armhf --target wizball -j$(nproc)
            '

      - uses: actions/upload-artifact@v6
        with:
          name: portmaster-binary-armhf
          path: build-armhf/wizball.armhf

  # ────────────────────────────────────────────────────────────────────────────
  # PortMaster package — assembles both arch binaries + game data into one zip.
  # This is the single file that gets submitted to PortMaster.
  # ────────────────────────────────────────────────────────────────────────────
  package-portmaster:
    name: PortMaster package
    runs-on: ubuntu-latest
    needs: [build-gamedata, build-portmaster-aarch64, build-portmaster-armhf]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: gamedata
          path: generated-data/

      - uses: actions/download-artifact@v8
        with:
          name: portmaster-binary-aarch64
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: portmaster-binary-armhf
          path: binaries/

      - name: Assemble staging layout
        run: |
          # PortMaster on-device layout:
          #   ports/WizBall.sh
          #   ports/wizball/wizball.aarch64
          #   ports/wizball/wizball.armhf
          #   ports/wizball/port.json  (+ other portmaster metadata)
          #   ports/wizball/data.zip
          mkdir -p staging/wizball

          # Launch script at ports root
          install -m 755 portmaster/WizBall.sh staging/

          # Both arch binaries
          install -m 755 binaries/wizball.aarch64 staging/wizball/
          install -m 755 binaries/wizball.armhf   staging/wizball/

          # PortMaster metadata (everything in portmaster/ except WizBall.sh)
          cp portmaster/port.json      staging/wizball/
          cp portmaster/gameinfo.xml   staging/wizball/
          cp portmaster/wizball.gptk   staging/wizball/
          cp portmaster/Wizball.png    staging/wizball/
          cp portmaster/cover.png      staging/wizball/
          cp portmaster/screenshot.png staging/wizball/
          cp -r portmaster/licenses    staging/wizball/

          # Game data
          cp generated-data/data.zip staging/wizball/

      - name: Package
        run: |
          cd "${{ github.workspace }}/staging"
          zip -r "${{ github.workspace }}/WizBall.zip" .

      - uses: actions/upload-artifact@v6
        with:
          name: WizBall-portmaster
          path: WizBall.zip

  # ────────────────────────────────────────────────────────────────────────────
  # Create a GitHub Release and attach all four packages.
  # Only runs on tag pushes; skipped for manual workflow_dispatch without a tag.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - build-gamedata
      - build-linux
      - build-windows
      - package-portmaster
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: '{wizball-linux-x86_64,wizball-windows-x86_64,WizBall-portmaster}'
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wizball-linux-x86_64-${{ github.ref_name }}.tar.gz
            artifacts/wizball-windows-x86_64-${{ github.ref_name }}.zip
            artifacts/WizBall.zip
