title = "Wizball Remake"

enableRobotsTXT = true

theme = "github.com/adityatelange/hugo-PaperMod"

[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "The Retrospec Wizball remake, its history, preserved source release, and modern builds."
  author = "Craig Chandler"

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

  defaultTheme = "auto"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "Wizball Remake"
    Content = "History of the Retrospec remake, preserved source, devlog, and modern downloads/build notes."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/craigchandler/wizball-remake"

